[pytest]
# VoidAccess test suite. Async tests use pytest-asyncio in auto mode, so
# `async def test_*` functions run without an explicit @pytest.mark.asyncio.
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
